name: Agent Evaluations

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Ejecutar diario a las 9 AM UTC (4 AM Colombia)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  test-agents:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Agent Evals - All Tests
      id: run-tests
      continue-on-error: true
      run: |
        python tests/agents/test_runner.py --export results.json
        echo "exit_code=$?" >> $GITHUB_OUTPUT
    
    - name: Generate Test Summary
      if: always()
      run: |
        if [ -f results.json ]; then
          echo "## Agent Evaluation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Parse results with jq
          total=$(jq '.total' results.json)
          passed=$(jq '.passed' results.json)
          failed=$(jq '.failed' results.json)
          pass_rate=$(jq '.tests | map(select(.passed == true)) | length' results.json)
          
          echo "**Total Tests**: $total" >> $GITHUB_STEP_SUMMARY
          echo "**Passed**: $passed ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Failed**: $failed ❌" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # List failed tests
          if [ $failed -gt 0 ]; then
            echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
            jq -r '.tests[] | select(.passed == false) | "- **\(.test_id)**: \(.description)"' results.json >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "❌ No results file generated" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: eval-results-${{ github.run_number }}
        path: results.json
        retention-days: 30
    
    - name: Fail if tests failed
      if: steps.run-tests.outputs.exit_code != '0'
      run: |
        echo "❌ Agent evaluations failed"
        echo "See test summary above for details"
        exit 1
    
    - name: Comment PR with Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          if (!fs.existsSync('results.json')) {
            console.log('No results file found');
            return;
          }
          
          const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));
          
          const body = `## 🤖 Agent Evaluation Results
          
**Total Tests**: ${results.total}
**Passed**: ${results.passed} ✅
**Failed**: ${results.failed} ❌
**Pass Rate**: ${((results.passed / results.total) * 100).toFixed(1)}%

${results.failed > 0 ? `### ❌ Failed Tests\n${results.tests.filter(t => !t.passed).map(t => `- **${t.test_id}**: ${t.description}\n  ${t.errors.slice(0, 2).map(e => `  - ${e}`).join('\n')}`).join('\n')}` : '### ✅ All tests passed!'}

---
*This comment was automatically generated by the Agent Evals workflow.*
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

  # Job separado para actualizar métricas diarias
  update-metrics:
    runs-on: ubuntu-latest
    needs: test-agents
    if: github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Collect Daily Metrics
      run: |
        python scripts/collect_agent_metrics.py
        python scripts/generate_dashboard.py
    
    - name: Commit Metrics
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .context/metrics/
        git commit -m "chore: update agent metrics [skip ci]" || echo "No changes to commit"
        git push
