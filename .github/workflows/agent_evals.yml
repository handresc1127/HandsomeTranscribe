name: Agent Evaluations

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC (4 AM Colombia)
  workflow_dispatch:

jobs:
  test-agents:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pytest on all tests
        id: run-tests
        continue-on-error: true
        run: |
          pytest tests/ -v --tb=short --json-report --json-report-file=results.json || true
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      
      - name: Generate Test Summary
        if: always()
        shell: bash
        run: |
          if [ -f results.json ]; then
            echo "## Agent Evaluation Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            passed=$(grep -c '"outcome": "passed"' results.json || echo "0")
            failed=$(grep -c '"outcome": "failed"' results.json || echo "0")
            total=$((passed + failed))
            
            echo "**Total Tests**: $total" >> $GITHUB_STEP_SUMMARY
            echo "**Passed**: $passed ✅" >> $GITHUB_STEP_SUMMARY
            echo "**Failed**: $failed ❌" >> $GITHUB_STEP_SUMMARY
            
            if [ "$failed" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
              grep -B2 '"outcome": "failed"' results.json | grep '"name"' | head -5 >> $GITHUB_STEP_SUMMARY || true
            fi
          else
            echo "⚠️ No test results file generated" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: results.json
          retention-days: 30
      
      - name: Fail if tests failed
        if: steps.run-tests.outputs.exit_code != '0'
        run: exit 1
